<!doctype html>
<html lang="en">
  <head>
    <script>
      // CRITICAL: Protect window.fetch and other common properties from being overwritten by polyfills
      // This must run as early as possible to catch libraries before they attempt to overwrite.
      (function() {
        const protect = (obj, prop) => {
          try {
            const descriptor = Object.getOwnPropertyDescriptor(obj, prop);
            if (descriptor && !descriptor.configurable) {
              console.warn(`Property ${prop} is not configurable. Cannot protect it.`);
              return;
            }
            const original = obj[prop];
            Object.defineProperty(obj, prop, {
              get: function() { return original; },
              set: function(val) { 
                console.warn(`A library attempted to overwrite ${prop}. This operation was ignored to prevent a TypeError.`);
                return true; // Pretend it worked to stop the error from propagating
              },
              configurable: true
            });
          } catch (e) {
            console.error(`Failed to protect ${prop}:`, e);
          }
        };

        // Protect on window and Window.prototype
        protect(window, 'fetch');
        protect(window, 'location');
        protect(window, 'navigator');
        
        if (typeof Window !== 'undefined') {
          protect(Window.prototype, 'fetch');
        }

        // Global error handler to catch and suppress benign errors
        const suppressBenignErrors = (e) => {
          const msg = e.message || (e.reason && e.reason.message) || String(e);
          if (msg.includes('Cannot set property fetch') || msg.includes('only a getter')) {
            console.warn('Caught and suppressed a known environment-specific error:', msg);
            if (e.preventDefault) e.preventDefault();
            return true; // Suppress the error
          }
          return false;
        };

        window.onerror = function(message, source, lineno, colno, error) {
          if (suppressBenignErrors({ message })) return true;
          return false;
        };

        window.addEventListener('error', (e) => {
          if (suppressBenignErrors(e)) {
            e.stopImmediatePropagation();
          }
        }, true);

        window.addEventListener('unhandledrejection', (event) => {
          if (suppressBenignErrors(event)) {
            event.stopImmediatePropagation();
          }
        }, true);
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HarvestOptima - Smart Farming</title>

  </head>

  </body>
</html>
